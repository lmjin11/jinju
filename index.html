<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진주시 방송/인터넷 가입자 현황</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/sample-data.js"></script>
</head>
<body>
  <!-- 헤더 -->
  <header id="header">
    <div class="header-left">
      <h1>진주시 가입자 현황</h1>
      <span class="subtitle">방송 / 인터넷 가입자 지도</span>
    </div>
    <div class="header-stats" id="headerStats">
      <!-- JS에서 채움 -->
    </div>
  </header>

  <div id="container">
    <!-- 사이드 패널 -->
    <aside id="sidebar">
      <!-- 빵가루 네비게이션 -->
      <nav id="breadcrumb">
        <span class="crumb active" data-level="district">진주시</span>
      </nav>

      <!-- 검색 -->
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="동/아파트 검색...">
      </div>

      <!-- 정렬 + % 토글 -->
      <div class="sort-controls">
        <label>정렬:</label>
        <select id="sortSelect">
          <option value="name">이름순</option>
          <option value="broadcast_desc">방송 가입자 많은순</option>
          <option value="internet_desc">인터넷 가입자 많은순</option>
          <option value="rate_desc">가입률 높은순</option>
        </select>
        <div class="mode-btn-group">
          <button class="mode-btn active" data-dtype="broadcast" onclick="setDataType('broadcast')">방송</button>
          <button class="mode-btn" data-dtype="internet" onclick="setDataType('internet')">인터넷</button>
        </div>
        <div class="mode-btn-group">
          <button class="mode-btn active" data-dmode="percent" onclick="setDisplayMode('percent')">%</button>
          <button class="mode-btn" data-dmode="number" onclick="setDisplayMode('number')">숫자</button>
        </div>
      </div>

      <!-- 데이터 리스트 -->
      <ul id="dataList">
        <!-- JS에서 채움 -->
      </ul>
    </aside>

    <!-- 지도 영역 -->
    <main id="mapArea">
      <div id="map"></div>
      <!-- 범례 -->
      <div id="legend">
        <h4>범례 (마커 상단/하단)</h4>
        <div class="legend-item">
          <span class="legend-circle" style="background: #3b82f6;"></span>
          <span>방송 가입자 (상단)</span>
        </div>
        <div class="legend-item">
          <span class="legend-circle" style="background: #10b981;"></span>
          <span>인터넷 가입자 (하단)</span>
        </div>
        <div class="legend-item" style="margin-top:4px;padding-top:4px;border-top:1px solid #e2e8f0;">
          <span class="legend-circle" style="background:#3b82f6;"></span>
          <span>아파트 가입자</span>
        </div>
        <div class="legend-item">
          <span class="legend-circle" style="background:#f59e0b;"></span>
          <span>단독주택 가입자</span>
        </div>
        <div class="legend-item">
          <span class="legend-circle" style="background:#cbd5e1;"></span>
          <span>미가입 세대</span>
        </div>
        <div class="legend-item" style="margin-top:4px;padding-top:4px;border-top:1px solid #e2e8f0;">
          <span class="legend-circle" style="background:linear-gradient(135deg,#f59e0b 50%,#ef4444 50%);"></span>
          <span>오피스텔</span>
        </div>
        <div class="legend-scale">
          <span class="small-circle"></span>
          <span>적음</span>
          <span class="big-circle"></span>
          <span>많음</span>
        </div>
      </div>
    </main>
  </div>

  <div style="position:fixed;bottom:30px;right:14px;font-size:21px;color:#94a3b8;z-index:1000;pointer-events:none;">
    made by 이명진
  </div>

  <script src="js/app.js?v=2"></script>
</body>
</html>
